<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>エントリー | 即興カスタム</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { padding-bottom: 40px; }
  .hero {
    text-align: center; padding: 28px 22px 8px;
  }
  .hero .game { font-size: 13px; font-weight: 800; letter-spacing: 2px; }
  .hero h1 { font-size: 23px; margin: 8px 0 4px; }
  .hero .cnt { color: var(--muted); font-size: 13px; }
  .entry-wrap { max-width: 540px; margin: 0 auto; padding: 14px 16px; }
  .done {
    text-align: center; padding: 30px 16px;
  }
  .done .check {
    width: 74px; height: 74px; border-radius: 50%; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--good), var(--accent));
    display: grid; place-items: center; font-size: 38px; color: #04121e;
    box-shadow: 0 0 30px rgba(52,230,160,.4);
  }
  .summary-card { text-align: left; margin: 18px 0; }
  .summary-card .ln { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .summary-card .ln:last-child { border: none; }
  .summary-card .k { color: var(--muted); }
  .summary-card .v { font-weight: 700; }
</style>
</head>
<body>
<div class="entry-wrap">
  <div id="hero" class="hero">
    <div class="game" id="gameLabel">—</div>
    <h1 id="title">即興カスタム</h1>
    <div class="cnt"><span id="count">0</span> 人がエントリー済み</div>
  </div>

  <div id="closedBox" class="panel hidden" style="text-align:center">
    <h2>エントリー受付は終了しました</h2>
    <p class="muted">主催者にお問い合わせください。</p>
  </div>

  <form id="form" class="panel hidden">
    <label class="field">
      <span class="lab">表示名 / ゲーマータグ <span class="req">*</span></span>
      <input type="text" id="nickname" placeholder="例: しんちゃん" autocomplete="off" required>
    </label>

    <label class="field">
      <span class="lab" id="riotLab">Riot ID</span>
      <input type="text" id="riotId" placeholder="例: Name#TAG" autocomplete="off">
    </label>

    <div class="field">
      <span class="lab">現在のランク <span class="req">*</span></span>
      <div class="row">
        <select id="tier" style="flex:2"></select>
        <select id="division" style="flex:1"></select>
      </div>
    </div>

    <div class="field">
      <span class="lab">第一希望ポジション <span class="req">*</span></span>
      <div class="pos-grid" id="primaryPos"></div>
    </div>

    <div class="field">
      <span class="lab">第二希望ポジション <span class="muted">(任意)</span></span>
      <div class="pos-grid" id="secondaryPos"></div>
    </div>

    <button type="submit" class="btn primary big" style="width:100%" id="submitBtn">エントリーする</button>
    <p class="muted" style="text-align:center;font-size:12px;margin-top:12px">
      同じ端末からは後で内容を修正できます。
    </p>
  </form>

  <div id="done" class="done panel hidden">
    <div class="check">✓</div>
    <h2>エントリー完了！</h2>
    <p class="muted">主催者のチーム分けをお待ちください。</p>
    <div class="summary-card" id="summary"></div>
    <button class="btn ghost" style="width:100%" id="editBtn">内容を修正する</button>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<script src="/js/common.js"></script>
<script src="/js/entry.js"></script>
</body>
</html>
