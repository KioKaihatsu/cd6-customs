<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>抽選ルーレット</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">
<link rel="stylesheet" href="/css/roulette.css">
</head>
<body>
<div class="appbar">
  <div class="logo"><span class="spark" style="background:linear-gradient(135deg,var(--gold),var(--accent2))">🎰</span> 抽選ルーレット</div>
  <div class="grow"></div>
  <a href="/admin" class="btn sm ghost" style="text-decoration:none">⚡ チーム分けツール</a>
  <button id="newBtn" class="btn sm ghost hidden">＋ 新しい抽選</button>
</div>

<div class="wrap">
  <!-- セットアップ -->
  <section id="setup" class="panel hidden" style="max-width:640px;margin:40px auto">
    <h2>抽選をはじめる</h2>
    <div class="sub">名前を入れて「QR生成してスタート」を押すだけ。参加者は名前と好物を入力します。</div>
    <label class="field">
      <span class="lab">抽選名 <span class="muted">（空欄なら自動）</span></span>
      <input type="text" id="rTitle" placeholder="例: 景品抽選会 / 席替えくじ">
    </label>
    <button id="createBtn" class="btn primary big" style="width:100%;font-size:18px;padding:18px">🎯 QR生成してスタート</button>
    <section id="rouletteList" class="hidden" style="margin-top:18px"></section>
  </section>

  <!-- ダッシュボード -->
  <main id="dash" class="hidden">
    <div class="grid cols2">
      <div class="panel">
        <h2>参加者エントリー用QRコード</h2>
        <div class="sub">参加者にスマホで読み取ってもらってください。</div>
        <div id="tunnelStatus" class="tunnel-status"></div>
        <div class="qr-box">
          <div id="qrcode"></div>
          <div class="qr-url">
            <div class="muted" style="font-size:12px">エントリーURL</div>
            <a id="joinUrl" href="#" target="_blank"></a>
            <button id="copyUrl" class="btn sm ghost">URLをコピー</button>
          </div>
        </div>
        <div class="row" style="margin-top:14px">
          <button id="openQrFull" class="btn sm">QRを拡大表示</button>
          <div class="spacer"></div>
          <label class="switch">
            <input type="checkbox" id="openToggle" checked>
            <span class="slider"></span>
            <span id="openLabel">受付中</span>
          </label>
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <h2 style="margin:0">エントリー一覧 <span id="entryCount" class="count-pill">0</span></h2>
          <div class="spacer"></div>
          <span class="muted">● 自動更新中</span>
        </div>
        <div class="sub">名前と好物がリアルタイムで反映されます。</div>
        <div id="entryList" class="entry-list"></div>
      </div>
    </div>

    <!-- ルーレット -->
    <section class="panel" style="margin-top:18px">
      <div class="row">
        <div>
          <h2 style="margin:0">🎰 抽選ルーレット</h2>
          <div class="sub" style="margin:4px 0 0">「抽選する」を押すとルーレットが回って当選者を決定します。</div>
        </div>
        <div class="spacer"></div>
        <label class="switch" title="一度当選した人を次回以降の抽選から除外します">
          <input type="checkbox" id="excludeToggle">
          <span class="slider"></span>
          <span>当選者を除外</span>
        </label>
      </div>

      <div id="winnerBanner" class="winner-banner hidden"></div>

      <div class="reel-window" id="reelWindow">
        <div class="reel-pointer"></div>
        <div class="reel" id="reel"></div>
        <div id="reelEmpty" class="reel-empty">参加者がエントリーするとここに表示されます</div>
      </div>

      <div class="row" style="margin-top:16px">
        <button id="drawBtn" class="btn primary big" disabled>🎲 抽選する</button>
        <div class="spacer"></div>
        <span id="winCount" class="muted"></span>
        <button id="resetWinners" class="btn sm ghost hidden">当選履歴をリセット</button>
      </div>

      <div id="winnersList" class="winners-list"></div>
    </section>
  </main>
</div>

<!-- QR 全画面モーダル -->
<div id="qrModal" class="modal hidden">
  <div class="modal-card">
    <div id="qrBig"></div>
    <h2 id="qrModalTitle" style="text-align:center"></h2>
    <p id="qrModalUrl" class="muted" style="text-align:center;word-break:break-all"></p>
    <button class="btn primary" style="width:100%" onclick="document.getElementById('qrModal').classList.add('hidden')">閉じる</button>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div id="confetti" class="confetti-layer"></div>

<script src="/vendor/qrcode.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/roulette.js"></script>
</body>
</html>
